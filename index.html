<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-1912947623378370">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1912947623378370"
        crossorigin="anonymous"></script>
</head>
<body>
    <h1>Minesweeper</h1>
    <div class="controls">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <button id="new-game">New Game</button>
        <button id="theme-toggle" type="button" aria-label="Switch to dark mode">Dark Mode</button>
    </div>
    <div class="status">
        <div id="timer">Time: 0s</div>
        <div id="mine-counter">Mines: 10</div>
    </div>
    <div id="game-board"></div>
    <section class="partner-contact" aria-labelledby="partner-contact-title">
        <h2 id="partner-contact-title">Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xlgkkrap" method="POST">
            <label for="partner-name">Name</label>
            <input id="partner-name" name="name" type="text" autocomplete="name" required>

            <label for="partner-email">Email</label>
            <input id="partner-email" name="email" type="email" autocomplete="email" required>

            <label for="partner-company">Company</label>
            <input id="partner-company" name="company" type="text" autocomplete="organization">

            <label for="partner-message">Message</label>
            <textarea id="partner-message" name="message" rows="5" required></textarea>

            <button type="submit">Send Inquiry</button>
        </form>
    </section>
    <script src="main.js"></script>
</body>
</html>
