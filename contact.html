<body>
    <header class="site-header">
        <nav class="nav" aria-label="주요 메뉴">
            <a class="brand" href="index.html">지뢰찾기 연구소</a>

    <main class="text-page">
        <h1>문의하기</h1>
        <p>게임 오류, 접근성 문제, 전략 가이드 보완 제안, 제휴 문의를 보낼 수 있습니다. 문의에 대한 답변은 입력한 이메일 주소로 전달됩니다.</p>
        <section class="partner-contact" aria-labelledby="contact-form-title">
            <h2 id="contact-form-title">문의 양식</h2>
            <form action="https://formspree.io/f/xlgkkrap" method="POST">
                <label for="contact-name">이름</label>
                <input id="contact-name" name="name" type="text" autocomplete="name" required>
                <label for="contact-email">이메일</label>
                <input id="contact-email" name="email" type="email" autocomplete="email" required>
                <label for="contact-message">문의 내용</label>
                <textarea id="contact-message" name="message" rows="6" required></textarea>
                <button type="submit">문의 보내기</button>
            </form>
        </section>
    </main>
    <footer class="site-footer"><p>© 2026 지뢰찾기 연구소</p></footer>
